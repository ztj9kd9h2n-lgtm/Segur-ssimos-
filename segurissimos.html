<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segurissimos — Corretores de Seguros</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

  :root {
    --black: #0a0a0a;
    --yellow: #F5C518;
    --yellow-dark: #c9a010;
    --white: #f7f5f0;
    --gray: #1a1a1a;
    --gray-mid: #2e2e2e;
    --text-muted: #888;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: transparent;
    transition: background 0.4s, backdrop-filter 0.4s;
  }
  nav.scrolled {
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(245,197,24,0.15);
  }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo img { height: 38px; width: auto; }
  nav ul { list-style: none; display: flex; gap: 2.5rem; }
  nav ul a {
    color: rgba(247,245,240,0.7);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  nav ul a:hover { color: var(--yellow); }
  .nav-cta {
    background: var(--yellow);
    color: var(--black) !important;
    padding: 0.6rem 1.4rem;
    border-radius: 2px;
    font-weight: 600 !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--yellow-dark) !important; color: var(--black) !important; }

  /* HERO */
  #hero { position: relative; height: 100vh; display: flex; align-items: center; overflow: hidden; }
  #hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  .hero-content { position: relative; z-index: 2; padding: 0 4rem; max-width: 800px; }
  .hero-eyebrow {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--yellow); margin-bottom: 1.5rem;
    opacity: 0; animation: fadeUp 0.8s 0.3s forwards;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 9vw, 9rem);
    line-height: 0.92; letter-spacing: 0.02em; margin-bottom: 2rem;
    opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
  }
  .hero-title .accent { color: var(--yellow); }
  .hero-title .italic-line {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2.5rem, 5vw, 5.5rem);
    color: rgba(247,245,240,0.6);
    display: block;
  }
  .hero-sub {
    font-size: 1.1rem; line-height: 1.7; color: rgba(247,245,240,0.65);
    max-width: 480px; margin-bottom: 2.5rem;
    opacity: 0; animation: fadeUp 0.8s 0.7s forwards;
  }
  .hero-actions {
    display: flex; gap: 1rem; align-items: center;
    opacity: 0; animation: fadeUp 0.8s 0.9s forwards;
  }
  .btn-primary {
    background: var(--yellow); color: var(--black);
    border: none; cursor: pointer;
    padding: 1rem 2rem;
    font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none; display: inline-block;
    transition: transform 0.2s, background 0.2s;
  }
  .btn-primary:hover { background: var(--yellow-dark); transform: translateY(-2px); }
  .btn-ghost {
    color: var(--white); text-decoration: none;
    font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em;
    padding: 1rem 0;
    border-bottom: 1px solid rgba(247,245,240,0.3);
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { color: var(--yellow); border-color: var(--yellow); }
  .hero-scroll {
    position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    opacity: 0; animation: fadeUp 0.8s 1.2s forwards;
  }
  .scroll-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
  .scroll-line { width: 1px; height: 50px; background: linear-gradient(to bottom, var(--yellow), transparent); animation: scrollPulse 2s infinite; }

  /* STATS BAND */
  .stats-band {
    background: var(--yellow);
    padding: 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2rem;
  }
  .stat { text-align: center; }
  .stat-number { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--black); line-height: 1; }
  .stat-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(10,10,10,0.6); margin-top: 0.3rem; }

  /* SECTIONS SHARED */
  section { padding: 8rem 4rem; }
  .section-eyebrow { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--yellow); margin-bottom: 1rem; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 5vw, 5rem); line-height: 0.95; letter-spacing: 0.02em; margin-bottom: 1.5rem; }
  .section-body { font-size: 1rem; line-height: 1.8; color: rgba(247,245,240,0.65); max-width: 520px; }

  /* SERVICES */
  #services { background: var(--gray); }
  .services-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; background: var(--gray-mid); }
  .service-card {
    background: var(--gray); padding: 2.5rem 2rem;
    cursor: pointer; transition: background 0.3s;
    position: relative; overflow: hidden;
  }
  .service-card::before {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: var(--yellow); transform: scaleX(0); transform-origin: left; transition: transform 0.4s;
  }
  .service-card:hover { background: #222; }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon { font-size: 2.2rem; margin-bottom: 1.5rem; display: block; }
  .service-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.04em; margin-bottom: 0.8rem; }
  .service-desc { font-size: 0.875rem; line-height: 1.7; color: var(--text-muted); }
  .service-link {
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-top: 1.5rem; font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--yellow);
    text-decoration: none; transition: gap 0.2s;
  }
  .service-link:hover { gap: 0.8rem; }

  /* WHY */
  #why { background: var(--black); }
  .why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; margin-top: 5rem; }
  .why-3d { position: relative; height: 500px; }
  #giraffe-canvas { width: 100%; height: 100%; border-radius: 4px; }
  .why-features { display: flex; flex-direction: column; gap: 2.5rem; }
  .feature { display: flex; gap: 1.5rem; align-items: flex-start; padding-bottom: 2.5rem; border-bottom: 1px solid var(--gray-mid); }
  .feature:last-child { border-bottom: none; padding-bottom: 0; }
  .feature-num { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--yellow); line-height: 1; flex-shrink: 0; width: 60px; }
  .feature-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
  .feature-desc { font-size: 0.875rem; line-height: 1.7; color: var(--text-muted); }

  /* TESTIMONIAL */
  #testimonial { background: var(--yellow); padding: 7rem 4rem; text-align: center; }
  .testimonial-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1.5rem, 3vw, 2.8rem); color: var(--black); max-width: 800px; margin: 0 auto 2rem; line-height: 1.4; }
  .testimonial-author { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(10,10,10,0.5); }

  /* CTA FINAL */
  #cta-final { background: var(--black); padding: 10rem 4rem; text-align: center; position: relative; overflow: hidden; }
  #cta-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.4; }
  .cta-inner { position: relative; z-index: 2; }
  .cta-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 7vw, 7rem); letter-spacing: 0.02em; line-height: 0.95; margin-bottom: 1.5rem; }
  .cta-title span { color: var(--yellow); }
  .cta-sub { font-size: 1rem; color: rgba(247,245,240,0.55); max-width: 460px; margin: 0 auto 2.5rem; line-height: 1.7; }

  /* FOOTER */
  footer { background: var(--gray); padding: 4rem; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; border-top: 1px solid var(--gray-mid); }
  .footer-brand p { font-size: 0.875rem; line-height: 1.7; color: var(--text-muted); margin-top: 1rem; max-width: 280px; }
  .footer-col h4 { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--yellow); margin-bottom: 1.2rem; }
  .footer-col ul { list-style: none; }
  .footer-col ul li { margin-bottom: 0.6rem; }
  .footer-col ul a { color: var(--text-muted); text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
  .footer-col ul a:hover { color: var(--white); }
  .footer-bottom { background: var(--gray); padding: 1.2rem 4rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--gray-mid); font-size: 0.75rem; color: var(--text-muted); }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes scrollPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s, transform 0.7s; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }
  .reveal-delay-5 { transition-delay: 0.5s; }

  /* Mobile */
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    nav ul { display: none; }
    section { padding: 5rem 1.5rem; }
    .hero-content { padding: 0 1.5rem; }
    .stats-band { grid-template-columns: repeat(2,1fr); padding: 2rem 1.5rem; }
    .services-grid { grid-template-columns: 1fr; }
    .services-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
    .why-grid { grid-template-columns: 1fr; gap: 3rem; }
    footer { grid-template-columns: 1fr; padding: 3rem 1.5rem; }
    .footer-bottom { flex-direction: column; gap: 0.5rem; text-align: center; padding: 1rem 1.5rem; }
  }
</style>
</head>
